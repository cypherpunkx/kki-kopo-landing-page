<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="100%" height="100%">
  <defs>
    <!-- Shadow filter for premium look -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <g transform="translate(200, 190)">
    <!-- 1. Bunga Sakura Kelopak 5 (Lambang Kushin Ryu) -->
    <!-- Setiap kelopak digambar menggunakan path dan diputar 72 derajat -->
    <g id="sakura-leaves" stroke="#000000" stroke-width="3.5" fill="#ffffff">
      <!-- Kelopak 1 (Atas) -->
      <path d="M 0,-60 C -35,-65 -55,-105 -30,-125 C -15,-135 0,-125 0,-125 C 0,-125 15,-135 30,-125 C 55,-105 35,-65 0,-60 Z" />
      <!-- Kelopak 2 (Kanan Atas) -->
      <path d="M 0,-60 C -35,-65 -55,-105 -30,-125 C -15,-135 0,-125 0,-125 C 0,-125 15,-135 30,-125 C 55,-105 35,-65 0,-60 Z" transform="rotate(72)" />
      <!-- Kelopak 3 (Kanan Bawah) -->
      <path d="M 0,-60 C -35,-65 -55,-105 -30,-125 C -15,-135 0,-125 0,-125 C 0,-125 15,-135 30,-125 C 55,-105 35,-65 0,-60 Z" transform="rotate(144)" />
      <!-- Kelopak 4 (Kiri Bawah) -->
      <path d="M 0,-60 C -35,-65 -55,-105 -30,-125 C -15,-135 0,-125 0,-125 C 0,-125 15,-135 30,-125 C 55,-105 35,-65 0,-60 Z" transform="rotate(216)" />
      <!-- Kelopak 5 (Kiri Atas) -->
      <path d="M 0,-60 C -35,-65 -55,-105 -30,-125 C -15,-135 0,-125 0,-125 C 0,-125 15,-135 30,-125 C 55,-105 35,-65 0,-60 Z" transform="rotate(288)" />
    </g>

    <!-- 2. Lingkaran Hitam Utama -->
    <circle cx="0" cy="0" r="80" fill="#000000" stroke="#000000" stroke-width="1" />
    <circle cx="0" cy="0" r="77" fill="none" stroke="#ffffff" stroke-width="2" />
    <circle cx="0" cy="0" r="54" fill="none" stroke="#ffffff" stroke-width="2.5" />

    <!-- 3. Teks Melingkar "KUSHIN RYU M KARATE - DO" -->
    <!-- Path invisible untuk penempatan teks -->
    <path id="text-path-top" d="M -66,0 A 66,66 0 1,1 66,0" fill="none" stroke="none" />
    <path id="text-path-bottom" d="M 66,0 A 66,66 0 0,1 -66,0" fill="none" stroke="none" />

    <text font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="12px" fill="#ffffff" letter-spacing="2.5px">
      <!-- Teks bagian atas melingkar -->
      <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">
        KUSHIN RYU M KARATE
      </textPath>
    </text>

    <text font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="13px" fill="#ffffff" letter-spacing="3px">
      <!-- Teks bagian bawah melingkar -->
      <textPath href="#text-path-bottom" startOffset="50%" text-anchor="middle">
        - DO -
      </textPath>
    </text>

    <!-- 4. Lingkaran Dalam: Bendera Merah Putih Indonesia -->
    <g clip-path="url(#inner-circle-clip)">
      <clipPath id="inner-circle-clip">
        <circle cx="0" cy="0" r="52" />
      </clipPath>
      <!-- Background Putih -->
      <rect x="-60" y="-60" width="120" height="120" fill="#ffffff" />
      <!-- Setengah Merah Atas -->
      <rect x="-60" y="-60" width="120" height="60" fill="#ff0000" />
      <!-- Pembatas hitam tipis (opsional, tapi logo asli memilikinya untuk memperjelas) -->
      <line x1="-52" y1="0" x2="52" y2="0" stroke="#000000" stroke-width="1.5" />
    </g>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#000000" stroke-width="2" />
  </g>

  <!-- 5. Pita Merah di Bawah dengan Teks INDONESIA -->
  <g filter="url(#drop-shadow)">
    <!-- Pita samping kiri -->
    <path d="M 80,315 L 110,290 L 110,320 Z" fill="#b30000" stroke="#000000" stroke-width="2" />
    <!-- Pita samping kanan -->
    <path d="M 320,315 L 290,290 L 290,320 Z" fill="#b30000" stroke="#000000" stroke-width="2" />
    
    <!-- Ekor pita kiri -->
    <path d="M 60,335 L 90,305 L 110,320 L 80,345 Z" fill="#d60000" stroke="#000000" stroke-width="2" />
    <!-- Ekor pita kanan -->
    <path d="M 340,335 L 310,305 L 290,320 L 320,345 Z" fill="#d60000" stroke="#000000" stroke-width="2" />

    <!-- Pita tengah -->
    <path d="M 90,305 Q 200,345 310,305 L 295,335 Q 200,375 105,335 Z" fill="#ff0000" stroke="#000000" stroke-width="2" stroke-linejoin="round" />

    <!-- Teks INDONESIA melengkung mengikuti pita -->
    <!-- Path untuk teks di pita -->
    <path id="ribbon-text-path" d="M 98,322 Q 200,358 302,322" fill="none" stroke="none" />
    <text font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="17px" fill="#ffffff" letter-spacing="4px">
      <textPath href="#ribbon-text-path" startOffset="50%" text-anchor="middle">
        INDONESIA
      </textPath>
    </text>
  </g>

  <!-- 6. Teks KKI (Tebal Hitam di Bawah) -->
  <text x="200" y="415" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="44px" fill="#000000" text-anchor="middle" letter-spacing="8px">
    KKI
  </text>
</svg>
